name: Bug Report / 缺陷报告
description: Report a bug to help us improve Jittor / 报告一个 Bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量填写以下信息，帮助我们快速定位问题。
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: 问题描述 / Describe the bug
      description: 请清晰描述你遇到的问题 / A clear description of what the bug is
      placeholder: 运行某某代码时出现了某某错误...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤 / Steps to reproduce
      description: 提供最小可复现代码或步骤 / Minimal code or steps to reproduce
      placeholder: |
        import jittor as jt
        # your code here
      render: python
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: 完整日志 / Full log
      description: 粘贴 Jittor 的完整运行日志 / Paste the full execution log
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为 / Expected behavior
      description: 描述你期望的正确行为 / What you expected to happen
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: 操作系统 / Operating System
      options:
        - Ubuntu 20.04
        - Ubuntu 22.04
        - Ubuntu 24.04
        - CentOS 7/8
        - Windows 10/11
        - macOS
        - Docker
        - 其他 / Other
    validations:
      required: true

  - type: input
    id: jittor-version
    attributes:
      label: Jittor 版本 / Jittor version
      description: "运行 python -c 'import jittor; print(jittor.__version__)' 获取"
      placeholder: "1.3.x.x"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python 版本 / Python version
      placeholder: "3.8 / 3.9 / 3.10 / 3.11"
    validations:
      required: true

  - type: dropdown
    id: gpu
    attributes:
      label: GPU 环境 / GPU
      options:
        - NVIDIA GPU (CUDA)
        - AMD GPU (ROCm)
        - CPU only
        - 其他 / Other
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: 确认 / Confirmation
      options:
        - label: 我已经搜索过现有 issue，没有找到相同的问题 / I have searched existing issues
          required: true
        - label: 我已经阅读过 [Jittor 文档](https://cg.cs.tsinghua.edu.cn/jittor/assets/docs/index.html) / I have read the docs
          required: true
